<article class="h-full overflow-hidden rounded-[1.75rem] border border-white/10 bg-slate-950/40 p-5 shadow-xl shadow-slate-950/25">
	<div class="flex flex-col gap-1">
		<h2 class="text-lg font-semibold text-white">{{ title() }}</h2>
		@if (subtitle()) {
			<p class="text-sm leading-6 text-slate-400">{{ subtitle() }}</p>
		}
	</div>

	<div class="mt-5 rounded-[1.25rem] border border-white/8 bg-slate-900/55 p-3" [style.min-height.px]="height() + 24">
		<ag-charts [options]="options()" class="block w-full" [style.height.px]="height()" [style.width.%]="100"></ag-charts>
	</div>
</article>
