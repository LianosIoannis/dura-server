<section
    class="min-h-screen bg-[radial-gradient(circle_at_top,rgba(34,211,238,0.18),transparent_35%),linear-gradient(180deg,#0f172a_0%,#111827_45%,#172033_100%)] text-slate-50">
    <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
		@if (loading()) {
			<div class="grid gap-6 md:grid-cols-2 xl:grid-cols-4">
				@for (_ of [1, 2, 3, 4, 5, 6]; track $index) {
					<div class="h-48 animate-pulse rounded-[1.75rem] border border-white/10 bg-white/8"></div>
				}
			</div>
		} @else {
			<div class="grid gap-6 md:grid-cols-2 xl:grid-cols-4">
            @for (card of statCards(); track card.label) {
            <a [routerLink]="card.route"
                class="group relative overflow-hidden rounded-[1.75rem] border border-white/10 bg-slate-950/40 p-5 shadow-xl shadow-slate-950/25 transition duration-200 hover:-translate-y-1 hover:border-white/20 hover:bg-slate-900/60 focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-cyan-300">
                <div class="absolute inset-0 bg-linear-to-br opacity-90 {{ card.accentClass }}"></div>
                <div class="relative flex h-full flex-col justify-between gap-6">
                    <div class="flex items-start justify-between gap-4">
                        <div>
                            <p class="text-sm font-medium text-slate-200">{{ card.label }}</p>
                            <p class="mt-3 text-4xl font-black tracking-tight text-white">{{ card.value }}</p>
                        </div>
                        <span
                            class="rounded-full border border-white/15 bg-white/10 px-3 py-1 text-xs font-semibold tracking-wide text-slate-100">
                            Open
                        </span>
                    </div>
                    <p class="max-w-xs text-sm leading-6 text-slate-300">{{ card.detail }}</p>
                </div>
					</a>
				}

				<div class="md:col-span-2 xl:col-span-2">
					<app-ag-chart
						title="Order status"
						subtitle="A quick view of how your repairs are currently distributed."
						[options]="statusChartOptions()"
					/>
				</div>

				<div class="md:col-span-2 xl:col-span-2">
					<app-ag-chart
						title="Monthly activity"
						subtitle="Customers and orders created over the last six months."
						[options]="monthlyActivityChartOptions()"
					/>
				</div>
			</div>
		}
	</div>
</section>
